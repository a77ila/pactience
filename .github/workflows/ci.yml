name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# The crate lives in src/, not at the repository root.
defaults:
  run:
    working-directory: src

jobs:
  test:
    name: fmt / clippy / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run tests
        # The suite is environment-independent by design: no pacman, paru,
        # network, or root needed (all external effects are behind traits).
        run: cargo test --all-targets --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: pactience-linux-x86_64
          path: src/target/release/pactience
          retention-days: 14

  msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Check compilation at the declared rust-version
        run: cargo check --locked
